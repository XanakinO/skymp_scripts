<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe's Journal</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #1c140f;
            color: #e8d8b0;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            position: relative;
        }

        /* Subtle Candle Flicker Overlay */
        .candle-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 20%, rgba(255, 200, 80, 0.12) 0%, transparent 50%);
            pointer-events: none;
            animation: candleFlicker 4s infinite alternate ease-in-out;
            z-index: 1;
            mix-blend-mode: screen;
        }

        @keyframes candleFlicker {
            0% { opacity: 0.75; transform: scale(1.02); }
            50% { opacity: 0.95; transform: scale(0.98); }
            100% { opacity: 0.82; transform: scale(1.01); }
        }

        .container { display: flex; flex-direction: column; height: 100vh; border: 12px solid #3a2a1f; box-shadow: 0 0 30px rgba(0,0,0,0.9); }

        .header { background: linear-gradient(#4a3728, #2c1e14); padding: 12px 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .header h1 { margin: 0; font-family: 'UnifrakturCook', cursive; font-size: 28px; color: #ffd700; text-shadow: 2px 2px 4px #000; }

        .toolbar { background: #2c1e14; padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 3px solid #d4af37; align-items: center; }
        button, select { background: #3a2a1f; color: #e8d8b0; border: 2px solid #d4af37; padding: 6px 12px; cursor: pointer; font-family: 'Cinzel', serif; }
        button:hover { background: #d4af37; color: #2c1e14; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .editor-panel { flex: 1; display: flex; flex-direction: column; padding: 15px; background: rgba(28,20,15,0.95); }
        .meta { display: flex; gap: 20px; margin-bottom: 12px; }
        input { background: #1c140f; border: 2px solid #d4af37; color: #e8d8b0; padding: 8px; width: 100%; }

        #quill-container { flex: 1; background: #f5e8c7; color: #2c1e14; border: 3px solid #3a2a1f; }
        .preview-panel { flex: 1; padding: 15px; background: #2c1e14; border-left: 4px solid #d4af37; overflow-y: auto; }
        .preview { 
            background: #f5e8c7 url('https://picsum.photos/id/1015/800/600') repeat; 
            color: #2c1e14; padding: 45px 40px; font-family: Georgia, serif; line-height: 1.8; 
            box-shadow: inset 0 0 80px rgba(0,0,0,0.5); border: 10px solid #3a2a1f; min-height: 80%;
        }

        .footer { background: #2c1e14; padding: 12px; text-align: right; border-top: 3px solid #d4af37; }
    </style>
</head>
<body>
    <div class="container">
        <div class="candle-flicker"></div>
        <div class="header"><h1>✍️ Scribe's Journal 🕯️</h1></div>

        <div class="toolbar">
            <button onclick="saveDraft()">💾 Save Draft</button>
            <button onclick="showHistory()">📜 History</button>
            <button onclick="openLibrary()">📖 Library</button>
            <button onclick="saveBook()" class="btn-primary">📤 Save & Publish</button>
        </div>

        <div class="main">
            <div class="editor-panel">
                <div class="meta">
                    <div style="flex:1"><label>Title:</label><input type="text" id="title"></div>
                    <div><label>Author:</label><input type="text" id="author" readonly></div>
                </div>
                <div id="quill-container"></div>
            </div>

            <div class="preview-panel">
                <h3 style="color:#d4af37;">📖 In-Book Preview</h3>
                <div id="preview" class="preview"></div>
            </div>
        </div>

        <div class="footer">
            <button onclick="saveBook()" class="btn-primary">Save & Publish to Server</button>
            <button onclick="closeEditor()">Close Journal</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        let quill;
        let bookId = '';
        let drafts = JSON.parse(localStorage.getItem('scribesDrafts') || '{}');

        function initQuill() {
            quill = new Quill('#quill-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'size': ['small', false, 'large', 'huge'] }],
                        ['bold', 'italic', 'underline'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'align': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['clean']
                    ]
                }
            });

            quill.on('text-change', updatePreview);
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'load') {
                document.getElementById('title').value = event.data.title || '';
                document.getElementById('author').value = event.data.author || 'Unknown Scribe';
                bookId = event.data.bookId || `book_${Date.now()}`;

                if (event.data.content) {
                    quill.root.innerHTML = event.data.content;
                }
                updatePreview();
                loadDraft();
            }
        });

        function updatePreview() {
            const preview = document.getElementById('preview');
            preview.innerHTML = quill.root.innerHTML;
        }

        function saveDraft() {
            const data = {
                title: document.getElementById('title').value,
                content: quill.root.innerHTML,
                timestamp: new Date().toISOString()
            };
            drafts[bookId] = data;
            localStorage.setItem('scribesDrafts', JSON.stringify(drafts));
            alert('Draft saved locally!');
        }

        function loadDraft() {
            if (drafts[bookId]) {
                document.getElementById('title').value = drafts[bookId].title || '';
                quill.root.innerHTML = drafts[bookId].content || '';
            }
        }

        function showHistory() {
            if (!drafts[bookId]) return alert('No history yet.');
            let historyHTML = '<h3>Version History</h3>';
            // Simple display of current draft
            historyHTML += `<p>${drafts[bookId].timestamp}</p>`;
            alert(historyHTML); // In full version use modal
        }

        function saveBook() {
            const data = {
                title: document.getElementById('title').value,
                content: quill.root.innerHTML,
                author: document.getElementById('author').value,
                bookId: bookId
            };
            window.dispatchEvent(new CustomEvent('saveScribesBook', { detail: data }));
        }

        function openLibrary() {
            window.dispatchEvent(new CustomEvent('openLibrary'));
        }

        function closeEditor() {
            window.dispatchEvent(new CustomEvent('closeEditor'));
        }

        window.onload = () => {
            initQuill();
            setTimeout(updatePreview, 200);
        };
    </script>
</body>
</html>

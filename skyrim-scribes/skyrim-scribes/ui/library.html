<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Library - Skyrim Scribes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #1c140f url('https://i.imgur.com/parchment.jpg') repeat; /* Replace with local texture */
            color: #e8d8b0;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            position: relative;
        }

        /* Subtle Candle Flicker Overlay */
        .candle-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 12% 18%, rgba(255, 180, 60, 0.14) 0%, transparent 55%);
            pointer-events: none;
            animation: candleFlicker 3.8s infinite alternate ease-in-out;
            z-index: 1;
            mix-blend-mode: screen;
        }

        @keyframes candleFlicker {
            0% { opacity: 0.68; transform: scale(1.03); }
            40% { opacity: 0.92; }
            100% { opacity: 0.79; transform: scale(0.97); }
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 12px solid #3a2a1f;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .header {
            background: linear-gradient(#4a3728, #2c1e14);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }

        .header h1 {
            margin: 0;
            font-family: 'UnifrakturCook', cursive;
            font-size: 32px;
            color: #ffd700;
        }

        .controls {
            background: #2c1e14;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 3px solid #d4af37;
        }

        input, select, button {
            background: #1c140f;
            color: #e8d8b0;
            border: 2px solid #d4af37;
            padding: 8px 12px;
            font-family: 'Cinzel', serif;
        }

        button:hover {
            background: #d4af37;
            color: #2c1e14;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
        }

        .book-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }

        .book-card {
            background: rgba(44, 30, 20, 0.95);
            border: 3px solid #d4af37;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .book-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #ffd700;
        }

        .book-title {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .book-meta {
            font-size: 14px;
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #2c1e14;
            border: 6px solid #d4af37;
            padding: 20px;
            max-width: 600px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="candle-flicker"></div>
        <div class="header">
            <h1>📖 The Grand Library of Skyrim Scribes 🕯️</h1>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search titles or authors..." onkeyup="filterBooks()">
            <select id="sortSelect" onchange="sortBooks()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="title">Title A-Z</option>
                <option value="author">Author A-Z</option>
            </select>
            <button onclick="showPublicBooks()">🌍 Public Books</button>
            <button onclick="shareCurrentBook()" class="btn-primary">📤 Share to Public</button>
            <button onclick="closeLibrary()">Close Library</button>
        </div>

        <div class="book-list" id="bookList">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Version History / Book View Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalMeta"></p>
            <div id="modalContent" style="background:#f5e8c7; color:#2c1e14; padding:20px; max-height:400px; overflow-y:auto; white-space:pre-wrap;"></div>
            <div style="margin-top:15px; text-align:right;">
                <button onclick="editBookFromModal()">✍️ Edit This Book</button>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let books = [];
        let currentFilter = 'personal';

        // Sample data - will be replaced by server messages
        function loadSampleBooks() {
            books = [
                { id: '1', title: 'The Fall of Winterhold', author: 'You', date: '2026-06-20', content: 'It was a cold night...', isPublic: false },
                { id: '2', title: 'Adventures in the Reach', author: 'You', date: '2026-06-22', content: 'The Forsworn...', isPublic: true },
                { id: '3', title: 'A Tavern Tale', author: 'Tavern Bard', date: '2026-06-18', content: 'Long ago...', isPublic: true }
            ];
            renderBooks();
        }

        function renderBooks(filteredBooks = books) {
            const container = document.getElementById('bookList');
            container.innerHTML = '';

            filteredBooks.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <div class="book-title">${book.title}</div>
                    <div class="book-meta">by ${book.author} • ${book.date}</div>
                    ${book.isPublic ? '<span style="color:#ffd700;">🌍 Public</span>' : ''}
                `;
                card.onclick = () => showBookDetail(book);
                container.appendChild(card);
            });
        }

        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.author.toLowerCase().includes(query)
            );
            renderBooks(filtered);
        }

        function sortBooks() {
            const sortBy = document.getElementById('sortSelect').value;
            let sorted = [...books];

            if (sortBy === 'newest') {
                sorted.sort((a,b) => new Date(b.date) - new Date(a.date));
            } else if (sortBy === 'oldest') {
                sorted.sort((a,b) => new Date(a.date) - new Date(b.date));
            } else if (sortBy === 'title') {
                sorted.sort((a,b) => a.title.localeCompare(b.title));
            } else if (sortBy === 'author') {
                sorted.sort((a,b) => a.author.localeCompare(b.author));
            }

            renderBooks(sorted);
        }

        function showBookDetail(book) {
            document.getElementById('modalTitle').textContent = book.title;
            document.getElementById('modalMeta').textContent = `by ${book.author} • ${book.date}`;
            document.getElementById('modalContent').textContent = book.content;
            document.getElementById('bookModal').style.display = 'flex';
            window.currentBook = book;
        }

        function closeModal() {
            document.getElementById('bookModal').style.display = 'none';
        }

        function editBookFromModal() {
            closeModal();
            // Send message to open editor with this book
            window.dispatchEvent(new CustomEvent('openEditor', { detail: window.currentBook }));
        }

        function showPublicBooks() {
            // Filter to public only
            const publicBooks = books.filter(b => b.isPublic);
            renderBooks(publicBooks);
        }

        function shareCurrentBook() {
            // In real implementation, send to server
            alert("Book shared to public catalog! (Server sync in progress)");
            // Example: window.dispatchEvent(new CustomEvent('shareBook', { detail: {bookId: 'current'} }));
        }

        function closeLibrary() {
            window.dispatchEvent(new CustomEvent('closeLibrary'));
        }

        // Receive data from Skyrim Platform
        window.addEventListener('message', (event) => {
            if (event.data.type === 'loadLibrary') {
                books = event.data.books || [];
                renderBooks();
            }
        });

        // Initialize
        window.onload = loadSampleBooks;
    </script>
</body>
</html>

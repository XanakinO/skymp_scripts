<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grand Library</title>
    <style>
        body {
            margin: 0;
            background: #0f0a05 url('https://i.imgur.com/5zZfK8J.jpg') center/cover;
            color: #d4c3a3;
            font-family: 'Cinzel', serif;
        }
        .library-frame {
            margin: 30px;
            border: 35px solid transparent;
            border-image: linear-gradient(#2c2118, #8c5f2e) 1;
            background: rgba(28, 20, 12, 0.96);
            box-shadow: 0 0 60px rgba(139, 69, 19, 0.7);
            padding: 30px;
        }
        .header {
            text-align: center;
            font-size: 38px;
            color: #ffd700;
            text-shadow: 0 0 20px #b8860b;
            margin-bottom: 25px;
        }
        .search-bar {
            width: 100%;
            padding: 12px;
            background: #1f160f;
            border: 3px solid #5c4033;
            color: #e8d5a3;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: #2c2118;
            border: 12px ridge #3c2f1e;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .book-card:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 0 0 30px #ffd700;
        }
        .candle { position: absolute; top: 20px; right: 30px; font-size: 36px; animation: flicker 2s infinite; }
        @keyframes flicker { 0%,100% {opacity:0.9;} 50% {opacity:1;} }
    </style>
</head>
<body>
    <div class="library-frame">
        <div class="candle">🕯️</div>
        <div class="header">📜 THE GRAND ARCHIVES OF TAMRIEL 📜</div>
        
        <input type="text" class="search-bar" id="search" placeholder="Search the ancient tomes..." onkeyup="filterBooks()">

        <div class="books-grid" id="booksGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        function filterBooks() {
            // Demo data
            console.log("Filtering library...");
        }

        // Demo books
        window.onload = () => {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = `
                <div class="book-card" onclick="viewBook(1)"><strong>The Fall of the Ayleids</strong><br><small>by Elara Moonwhisper</small></div>
                <div class="book-card" onclick="viewBook(2)"><strong>Chronicles of the Last Dragonborn</strong><br><small>Anonymous Scribe</small></div>
            `;
        };

        function viewBook(id) {
            alert("Opening tome #" + id + " — High Fantasy preview would load here.");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DIRECTOR MODE - SkyMP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Cinzel', serif;
            background: linear-gradient(rgba(20,20,30,0.95), rgba(20,20,30,0.95)), url('skyrim-bg.jpg') center/cover;
            color: #d4af37;
            overflow: hidden;
            height: 100vh;
        }
        .header { background: #1a140f; padding: 10px; border-bottom: 3px solid #8b5a2b; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { width: 220px; background: #1a140f; height: 100%; position: absolute; padding: 20px 0; }
        .main { margin-left: 240px; padding: 20px; }
        .panel { background: rgba(40,35,30,0.9); border: 2px solid #8b5a2b; margin-bottom: 15px; padding: 15px; border-radius: 4px; }
        button { background: #4a2c0f; color: #e0d4b3; border: 2px solid #d4af37; padding: 8px 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #6b3f1a; }
        .active-event { background: rgba(139, 90, 43, 0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h1>DIRECTOR MODE</h1>
        <div>Connected to: SkyMP Server • 7:42 PM</div>
    </div>

    <div class="sidebar">
        <ul>
            <li><strong>DASHBOARD</strong></li>
            <li>LIVE EVENTS</li>
            <li>SPAWN TOOLS</li>
            <li>NPC & AI CONTROL</li>
            <!-- Add more nav items -->
        </ul>
    </div>

    <div class="main">
        <div class="panel active-event">
            <h2>DRAGON ATTACK: RIVERWOOD <span style="color:green;">ACTIVE</span></h2>
            <button onclick="endEvent()">END EVENT</button>
            <button onclick="startEvent('dragonAttack', 'Riverwood')">Start Dragon Attack</button>
        </div>

        <div class="panel">
            <h3>Spawn Tools</h3>
            <input type="text" placeholder="Search NPC..." id="spawnSearch">
            <button onclick="spawnNpc()">SPAWN</button>
        </div>

        <!-- World Controls, etc. -->
    </div>

    <script>
        function startEvent(type, location) {
            window.dispatchEvent(new CustomEvent('skympMessage', { detail: { type: 'startEvent', data: {type, location} } }));
            console.log('Event started:', type);
        }

        function endEvent() {
            console.log('Event ended');
        }

        function spawnNpc() {
            const search = document.getElementById('spawnSearch').value;
            window.dispatchEvent(new CustomEvent('skympMessage', { detail: { type: 'spawnNpc', data: {type: search} } }));
        }

        // CEF message handling setup
        window.addEventListener('skympMessage', (e) => {
            // Handled by SkyrimPlatform
        });
    </script>
</body>
</html>

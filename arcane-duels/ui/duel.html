<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Arcane Duels</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #1a140f url('parchment-leather.jpg') repeat;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            image-rendering: crisp-edges;
        }

        .arena {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(20,15,10,0.95), rgba(30,20,15,0.95));
            border: 25px solid #3c2f1f;
            box-shadow: 0 0 80px #d4af37 inset, 0 0 40px #000 inset;
            position: relative;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(#3c2f1f, #1a140f);
            border-bottom: 8px double #d4af37;
            font-family: 'UnifrakturCook', cursive;
            font-size: 42px;
            text-shadow: 0 0 15px #ffd700;
            letter-spacing: 4px;
        }

        .combatants {
            display: flex;
            justify-content: space-between;
            padding: 30px 60px;
        }

        .player-side {
            text-align: center;
            width: 45%;
        }

        .health-bar {
            height: 28px;
            background: #330000;
            border: 4px solid #8b4513;
            margin-bottom: 12px;
            position: relative;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(#ff2222, #aa0000);
            transition: width 0.4s ease;
        }

        .actions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1e14;
            border: 12px double #d4af37;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 40px #000;
        }

        button {
            background: #3c2f1f;
            color: #ffd700;
            border: 3px solid #8b5a2b;
            padding: 14px 28px;
            margin: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #5c4730;
            box-shadow: 0 0 20px #ffd700;
        }

        .log {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 120px;
            background: rgba(0,0,0,0.7);
            border: 4px solid #8b5a2b;
            padding: 15px;
            overflow-y: auto;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="arena">
        <div class="header">⚔️ ARCANE DUEL ⚔️</div>
        
        <div class="combatants">
            <div class="player-side">
                <h2 id="player-name">You</h2>
                <div class="health-bar"><div id="player-health" class="health-fill" style="width:100%"></div></div>
            </div>
            <div class="player-side">
                <h2 id="opponent-name">Opponent</h2>
                <div class="health-bar"><div id="opponent-health" class="health-fill" style="width:100%"></div></div>
            </div>
        </div>

        <div class="log" id="battle-log">Duel begins...</div>

        <div class="actions">
            <button onclick="chooseAction('attack')">Strike</button>
            <button onclick="chooseSpell('Firebolt')">🔥 Firebolt (3t)</button>
            <button onclick="chooseSpell('Frost Nova')">❄️ Frost Nova (4t)</button>
            <button onclick="chooseSpell('Arcane Blast')">⚡ Arcane Blast (5t)</button>
            <button onclick="chooseAction('skill')">Use Skill</button>
            <button onclick="chooseAction('item')">Item</button>
            <button onclick="surrender()">Surrender</button>
        </div>
    </div>

    <script>
        function chooseAction(type) {
            window.skyrimPlatform.sendMessage({ type: 'duelAction', action: type });
            addLog(`You used ${type}...`);
        }

        function chooseSpell(spellName) {
            window.skyrimPlatform.sendMessage({ 
                type: 'duelAction', 
                action: 'spell', 
                spell: spellName 
            });
            addLog(`You cast ${spellName}...`);
        }

        function surrender() {
            if (confirm("Yield the duel?")) {
                window.skyrimPlatform.sendMessage({ type: 'duelAction', action: 'surrender' });
            }
        }

        function addLog(message) {
            const log = document.getElementById('battle-log');
            log.innerHTML += '<br>' + message;
            log.scrollTop = log.scrollHeight;
        }

        // Receive updates from client plugin
        window.addEventListener('message', (event) => {
            if (event.data.type === 'updateDuel') {
                document.getElementById('player-health').style.width = event.data.playerHp + '%';
                document.getElementById('opponent-health').style.width = event.data.opponentHp + '%';
                if (event.data.log) addLog(event.data.log);
            }
        });
    </script>
</body>
</html>
